proxy_headers_hash_max_size 1024;
proxy_headers_hash_bucket_size 128;

map $http_x_forwarded_proto $watch_yellow_house_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

upstream watch_yellow_house_django {
    server unix:/run/watch-yellow-house/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name @@SERVER_NAME@@;

    client_max_body_size 10m;

    location /static/ {
        alias @@STATIC_DIR@@/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # A live fragmented MP4 response must not be buffered or given a short timeout.
    location ~ ^/video-feeds/[0-9]+/stream/$ {
        proxy_pass http://watch_yellow_house_django;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        send_timeout 1h;
        add_header X-Accel-Buffering no;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $watch_yellow_house_forwarded_proto;
    }

    location / {
        proxy_pass http://watch_yellow_house_django;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $watch_yellow_house_forwarded_proto;
    }
}
